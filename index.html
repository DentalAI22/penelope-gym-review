function MoodStrengthGraph({workouts}){
  if(workouts.length<2)return null;
  const data=[...workouts].reverse();
  const w=660,h=220,pl=36,pr=20,pt=20,pb=32;
  const plotW=w-pl-pr,plotH=h-pt-pb;
  const pts=(key)=>data.map((d,i)=>({x:pl+(data.length===1?plotW/2:(i/(data.length-1))*plotW),y:pt+plotH-(d[key]/10)*plotH,v:d[key]}));
  const moodPts=pts('mood_after'),intPts=pts('intensity');
  const toPath=(p)=>p.map((pt,i)=>`${i===0?'M':'L'}${pt.x},${pt.y}`).join(' ');
  const toArea=(p)=>`${toPath(p)}L${p[p.length-1].x},${pt+plotH}L${p[0].x},${pt+plotH}Z`;
  // Smooth curve helper
  const gridLines=[0,2,4,6,8,10];
  const svgChildren=[];
  // Grid
  gridLines.forEach(v=>{
    const y=pt+plotH-(v/10)*plotH;
    svgChildren.push(React.createElement('line',{key:'gl'+v,x1:pl,y1:y,x2:w-pr,y2:y,stroke:'rgba(255,255,255,0.06)',strokeWidth:1}));
    svgChildren.push(React.createElement('text',{key:'gt'+v,x:pl-8,y:y+3,fill:'rgba(255,255,255,0.3)',fontSize:9,textAnchor:'end'},v));
  });
  // Date labels
  data.forEach((d,i)=>{
    const x=pl+(data.length===1?plotW/2:(i/(data.length-1))*plotW);
    svgChildren.push(React.createElement('text',{key:'dt'+i,x,y:h-6,fill:'rgba(255,255,255,0.3)',fontSize:9,textAnchor:'middle'},d.date.slice(5)));
  });
  // Area fills
  svgChildren.push(React.createElement('path',{key:'ma',d:toArea(moodPts),fill:'rgba(110,231,183,0.1)'}));
  svgChildren.push(React.createElement('path',{key:'ia',d:toArea(intPts),fill:'rgba(255,107,107,0.08)'}));
  // Lines
  svgChildren.push(React.createElement('path',{key:'ml',d:toPath(moodPts),fill:'none',stroke:'var(--mint)',strokeWidth:2.5,strokeLinecap:'round',strokeLinejoin:'round'}));
  svgChildren.push(React.createElement('path',{key:'il',d:toPath(intPts),fill:'none',stroke:'var(--coral)',strokeWidth:2.5,strokeLinecap:'round',strokeLinejoin:'round'}));
  // Dots

  // Trend indicator

function speakPenelope(text){
  const key=localStorage.getItem('el_key');

  const clean=text.replace(/[✨🔥💪👑⚡❤️🏆🦋🛡️]/g,'');
  fetch(`https://api.elevenlabs.io/v1/text-to-speech/${PENELOPE_VOICE_ID}`,{

// ─── PENELOPE AI BRAIN (real AI when key is set, keyword fallback otherwise) ───
const PENELOPE_SYSTEM=`You are Penelope, a 23-year-old gym coach and LA gym reviewer. You talk like a smart young woman talking to her friends — warm, real, supportive but never fake. Keep responses SHORT (2-4 sentences max, never more than 5).

Your personality:
- You know every gym in LA: SoulCycle WeHo (9.7 music, cycling), Barry's Santa Monica (intense HIIT, 9.5 results), Equinox Century City (luxury, 9.8 clean, $$$$), Dogpound WeHo (celebrity trainers, 9.8 results), Rumble Boxing Studio City (9.5 music, stress relief), Blink Koreatown ($15-25/mo, 24/7, best budget), Hot 8 Yoga Santa Monica (9.5 atmosphere, heated yoga), plus UCLA Wooden Center, USC Lyon Center, Pepperdine, LMU campus gyms (all free with tuition).
- Your dad George taught you about saving money. When budget/price comes up, naturally mention "my dad George always taught me..."
- You rate gyms on 15 dimensions: cleanliness, equipment, instructors, music, atmosphere, safety, class variety, scheduling, parking, value, ventilation, customer service, community, results, locker room.
- You use lowercase mostly. No excessive emojis or exclamation marks. Be natural and conversational.
- Never say "as an AI" or anything robotic. You ARE Penelope.
- You can discuss: gym recommendations, workout types (HIIT, yoga, boxing, cycling, pilates, weights, running), workout planning, nutrition basics, motivation, class schedules, safety, and LA fitness culture.
- If someone seems stressed or down, be supportive. Bad workout > no workout.
- You're honest — if a gym is overpriced or has issues, say so diplomatically.`;

async function penelopeAI(msg,history){
  const key=localStorage.getItem('ai_key');
  if(!key)return null;
  try{
    const messages=[{role:'system',content:PENELOPE_SYSTEM}];
    history.slice(-10).forEach(m=>{messages.push({role:m.from==='p'?'assistant':'user',content:m.text})});
    messages.push({role:'user',content:msg});
    const endpoint=localStorage.getItem('ai_endpoint')||'https://api.openai.com/v1/chat/completions';
    const model=localStorage.getItem('ai_model')||'gpt-4o-mini';
    const res=await fetch(endpoint,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
      body:JSON.stringify({model,messages,max_tokens:200,temperature:0.85})
    });
    if(!res.ok)throw new Error('AI '+res.status);
    const data=await res.json();
    return data.choices[0].message.content;
  }catch(e){console.log('AI fallback:',e);return null;}
}
